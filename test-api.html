<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API调用测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 3px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { margin: 5px; padding: 8px 16px; cursor: pointer; }
        input { margin: 5px; padding: 8px; }
    </style>
</head>
<body>
    <h1>API调用测试</h1>
    
    <div class="test-section">
        <h2>测试1：直接调用后端API</h2>
        <button onclick="testDirectApi()">测试注册API</button>
        <div id="test1-result"></div>
    </div>
    
    <div class="test-section">
        <h2>测试2：使用fetch API</h2>
        <input type="text" id="test-username" placeholder="用户名" value="testfetch">
        <input type="password" id="test-password" placeholder="密码" value="123456">
        <button onclick="testFetchApi()">测试fetch调用</button>
        <div id="test2-result"></div>
    </div>
    
    <script>
        function addResult(elementId, message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.textContent = message;
            document.getElementById(elementId).appendChild(div);
        }
        
        // 测试1：直接调用后端API
        async function testDirectApi() {
            const resultDiv = document.getElementById('test1-result');
            resultDiv.innerHTML = '';
            
            addResult('test1-result', '开始测试直接调用后端API...');
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: 'testdirect' + Date.now(),
                        password: '123456',
                        phone: '13800138000',
                        email: 'test@example.com'
                    })
                });
                
                addResult('test1-result', `状态码: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('test1-result', `响应数据: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
                
            } catch (error) {
                addResult('test1-result', `错误: ${error.message}`, 'error');
                addResult('test1-result', `错误详情: ${JSON.stringify(error)}`, 'error');
            }
        }
        
        // 测试2：使用fetch API，模拟前端调用
        async function testFetchApi() {
            const resultDiv = document.getElementById('test2-result');
            resultDiv.innerHTML = '';
            
            const username = document.getElementById('test-username').value;
            const password = document.getElementById('test-password').value;
            
            addResult('test2-result', `开始测试fetch API调用，用户名: ${username}`);
            
            try {
                // 模拟前端API调用
                const API_BASE_URL = 'http://localhost:3000/api';
                const endpoint = '/auth/register';
                const url = `${API_BASE_URL}${endpoint}`;
                
                addResult('test2-result', `请求URL: ${url}`);
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username + Date.now(),
                        password: password,
                        phone: '13800138000',
                        email: 'test@example.com'
                    })
                });
                
                addResult('test2-result', `状态码: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                
                const data = await response.json();
                addResult('test2-result', `响应数据: ${JSON.stringify(data)}`, response.ok ? 'success' : 'error');
                
            } catch (error) {
                addResult('test2-result', `错误: ${error.message}`, 'error');
                addResult('test2-result', `错误详情: ${JSON.stringify(error)}`, 'error');
            }
        }
    </script>
</body>
</html>
